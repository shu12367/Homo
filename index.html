<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>BLASEN - Arena Kampf</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
            touch-action: pan-y;
            overflow-y: auto;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            border: 5px solid gold;
            margin: 10px auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            border-radius: 30px;
            border: 3px solid white;
        }

        h1 {
            color: gold;
            font-size: 48px;
            text-shadow: 3px 3px 0 #000, 5px 5px 0 purple;
            margin-bottom: 5px;
        }

        .rebirth-info {
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }

        .main-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.9);
            padding: 10px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }

        .menu-button {
            flex: 1;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 15px;
            border-radius: 20px;
            border: 3px solid gold;
            text-align: center;
            cursor: pointer;
            text-shadow: 1px 1px 0 #000;
        }

        .menu-button.active {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            border-color: white;
        }

        /* MAIN GAME VIEW */
        .main-view {
            display: block;
        }

        .main-view.hidden {
            display: none;
        }

        /* ARENA VIEW */
        .arena-view {
            display: none;
        }

        .arena-view.active {
            display: block;
        }

        .arena-stats {
            background: #2c3e50;
            border-radius: 20px;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            border: 3px solid gold;
        }

        .arena-stat {
            background: #fff;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        .arena-canvas-container {
            position: relative;
            width: 100%;
            height: 400px;
            background: #8B4513;
            border-radius: 30px;
            border: 4px solid gold;
            overflow: hidden;
            margin-bottom: 15px;
        }

        #arenaCanvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #D2B48C;
            touch-action: none;
        }

        .arena-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .arena-joystick {
            flex: 2;
            background: #4a4a4a;
            border-radius: 30px;
            padding: 20px;
            border: 4px solid gold;
            position: relative;
            height: 120px;
            touch-action: none;
        }

        .joystick-base {
            width: 60px;
            height: 60px;
            background: #666;
            border-radius: 30px;
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            border: 3px solid #333;
        }

        .joystick-handle {
            width: 40px;
            height: 40px;
            background: #ff6b6b;
            border-radius: 20px;
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            border: 3px solid white;
            cursor: pointer;
            transition: 0.05s;
            touch-action: none;
        }

        .arena-attack-button {
            flex: 1;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid gold;
            cursor: pointer;
            touch-action: none;
        }

        .arena-attack-button:active {
            transform: scale(0.95);
        }

        .attack-icon {
            font-size: 40px;
        }

        .attack-text {
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
        }

        .enemy-list {
            background: #34495e;
            border-radius: 20px;
            padding: 15px;
            border: 3px solid gold;
            max-height: 200px;
            overflow-y: auto;
        }

        .enemy-item {
            background: #fff;
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid gold;
        }

        .enemy-item.current {
            background: #f1c40f;
            border: 3px solid #e67e22;
        }

        .enemy-health-bar {
            width: 100px;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
        }

        .enemy-health-fill {
            height: 100%;
            background: linear-gradient(90deg, #27ae60 0%, #2ecc71 100%);
        }

        .tournament-info {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
            border: 3px solid gold;
            text-align: center;
        }

        .tournament-button {
            background: linear-gradient(135deg, #f1c40f 0%, #e67e22 100%);
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 15px;
            border-radius: 30px;
            border: 3px solid white;
            cursor: pointer;
            margin-top: 10px;
            text-shadow: 1px 1px 0 #000;
        }

        .tournament-button:active {
            transform: scale(0.95);
        }

        .tournament-button.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .back-button {
            background: #95a5a6;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
            border-radius: 20px;
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            border: 2px solid white;
        }

        .stats-container {
            background: #2c3e50;
            border-radius: 30px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            border: 3px solid gold;
        }

        .stat-box {
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 2px solid gold;
        }

        .stat-label {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
        }

        .stat-value#coins {
            color: gold;
            text-shadow: 1px 1px 0 #000;
        }

        .character-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .character-area {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            border-radius: 30px;
            padding: 15px;
            border: 4px solid gold;
            cursor: pointer;
            transition: transform 0.1s;
            text-align: center;
            flex: 2;
            min-height: 350px;
            position: relative;
        }

        .character-area:active {
            transform: scale(0.98);
        }

        /* BLASEN CHARACTER - ORIGINAL SKIN */
        .blasen-character {
            width: 100%;
            height: 280px;
            position: relative;
            margin: 0 auto;
        }

        /* Kopf */
        .blasen-head {
            position: absolute;
            width: 120px;
            height: 120px;
            background: #f5deb3;
            border-radius: 50%;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            border: 4px solid #000;
            box-shadow: inset -5px -5px 0 rgba(0,0,0,0.1);
            z-index: 2;
        }

        /* Haar */
        .blasen-hair {
            position: absolute;
            width: 130px;
            height: 45px;
            background: #8b4513;
            top: 0px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 50% 50% 0 0;
            border: 4px solid #000;
            border-bottom: none;
            z-index: 3;
        }

        .blasen-hair-front {
            position: absolute;
            width: 50px;
            height: 25px;
            background: #8b4513;
            top: 15px;
            left: 50%;
            transform: translateX(-50%) rotate(5deg);
            border-radius: 50%;
            border: 4px solid #000;
            z-index: 3;
        }

        /* Augen */
        .blasen-eye-left {
            position: absolute;
            width: 22px;
            height: 26px;
            background: #fff;
            border-radius: 50%;
            top: 50px;
            left: 50%;
            transform: translateX(-80%);
            border: 3px solid #000;
            z-index: 3;
        }

        .blasen-eye-right {
            position: absolute;
            width: 22px;
            height: 26px;
            background: #fff;
            border-radius: 50%;
            top: 50px;
            left: 50%;
            transform: translateX(20%);
            border: 3px solid #000;
            z-index: 3;
        }

        .blasen-pupil-left {
            position: absolute;
            width: 10px;
            height: 12px;
            background: #000;
            border-radius: 50%;
            top: 57px;
            left: 50%;
            transform: translateX(-95%);
            z-index: 4;
        }

        .blasen-pupil-right {
            position: absolute;
            width: 10px;
            height: 12px;
            background: #000;
            border-radius: 50%;
            top: 57px;
            left: 50%;
            transform: translateX(5%);
            z-index: 4;
        }

        /* Augenbrauen */
        .blasen-eyebrow-left {
            position: absolute;
            width: 25px;
            height: 6px;
            background: #000;
            top: 40px;
            left: 50%;
            transform: translateX(-90%) rotate(-5deg);
            border-radius: 10px;
            z-index: 4;
        }

        .blasen-eyebrow-right {
            position: absolute;
            width: 25px;
            height: 6px;
            background: #000;
            top: 40px;
            left: 50%;
            transform: translateX(10%) rotate(5deg);
            border-radius: 10px;
            z-index: 4;
        }

        /* Nase */
        .blasen-nose {
            position: absolute;
            width: 14px;
            height: 12px;
            background: #d2691e;
            border-radius: 40%;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            border: 2px solid #000;
            z-index: 3;
        }

        /* Mund */
        .blasen-mouth {
            position: absolute;
            width: 35px;
            height: 18px;
            border-bottom: 4px solid #000;
            border-radius: 50%;
            top: 95px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
        }

        /* Körper */
        .blasen-body {
            position: absolute;
            width: 100px;
            height: 85px;
            background: #4169e1;
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
            border: 4px solid #000;
            border-radius: 30px 30px 20px 20px;
            box-shadow: inset -5px -5px 0 #1e3a8a;
            z-index: 1;
        }

        /* Kragen */
        .blasen-collar {
            position: absolute;
            width: 70px;
            height: 18px;
            background: #ffd700;
            top: 122px;
            left: 50%;
            transform: translateX(-50%);
            border: 3px solid #000;
            border-radius: 10px;
            z-index: 2;
        }

        /* Arme */
        .blasen-arm-left {
            position: absolute;
            width: 25px;
            height: 70px;
            background: #4169e1;
            top: 135px;
            left: 50%;
            transform: translateX(-180%) rotate(15deg);
            border: 4px solid #000;
            border-radius: 20px;
            z-index: 1;
        }

        .blasen-arm-right {
            position: absolute;
            width: 25px;
            height: 70px;
            background: #4169e1;
            top: 135px;
            left: 50%;
            transform: translateX(80%) rotate(-15deg);
            border: 4px solid #000;
            border-radius: 20px;
            z-index: 1;
        }

        /* Handschuhe */
        .blasen-glove-left {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #fff;
            top: 190px;
            left: 50%;
            transform: translateX(-200%);
            border: 4px solid #000;
            border-radius: 50%;
            z-index: 2;
        }

        .blasen-glove-right {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #fff;
            top: 190px;
            left: 50%;
            transform: translateX(100%);
            border: 4px solid #000;
            border-radius: 50%;
            z-index: 2;
        }

        /* Beine */
        .blasen-leg-left {
            position: absolute;
            width: 30px;
            height: 70px;
            background: #2c3e50;
            top: 205px;
            left: 50%;
            transform: translateX(-80%);
            border: 4px solid #000;
            border-radius: 0 0 20px 20px;
            z-index: 1;
        }

        .blasen-leg-right {
            position: absolute;
            width: 30px;
            height: 70px;
            background: #2c3e50;
            top: 205px;
            left: 50%;
            transform: translateX(20%);
            border: 4px solid #000;
            border-radius: 0 0 20px 20px;
            z-index: 1;
        }

        /* Schuhe */
        .blasen-shoe-left {
            position: absolute;
            width: 38px;
            height: 18px;
            background: #000;
            top: 270px;
            left: 50%;
            transform: translateX(-90%);
            border: 3px solid #333;
            border-radius: 10px;
            z-index: 2;
        }

        .blasen-shoe-right {
            position: absolute;
            width: 38px;
            height: 18px;
            background: #000;
            top: 270px;
            left: 50%;
            transform: translateX(10%);
            border: 3px solid #333;
            border-radius: 10px;
            z-index: 2;
        }

        .click-text {
            font-size: 20px;
            color: white;
            font-weight: bold;
            margin-top: 280px;
            text-shadow: 2px 2px 0 #000;
            position: relative;
            z-index: 10;
        }

        .click-counter {
            font-size: 24px;
            color: gold;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 5px;
            border: 2px solid white;
            position: relative;
            z-index: 10;
        }

        .auto-toggle-button {
            background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
            border-radius: 30px;
            padding: 15px;
            border: 4px solid gold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 350px;
        }

        .auto-toggle-button.active {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            box-shadow: 0 0 20px #2ecc71;
        }

        .auto-icon {
            font-size: 60px;
        }

        .auto-status {
            font-size: 20px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 0 #000;
            margin: 10px 0;
        }

        .auto-speed {
            font-size: 18px;
            color: white;
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid white;
        }

        .shop-container {
            background: #2c3e50;
            border-radius: 30px;
            padding: 20px;
            border: 3px solid gold;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .shop-title {
            color: gold;
            font-size: 28px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }

        .shop-items {
            display: grid;
            gap: 10px;
        }

        .shop-item {
            background: #fff;
            border-radius: 15px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: 2px solid gold;
        }

        .shop-item:active {
            transform: scale(0.98);
        }

        .shop-item.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .item-icon {
            font-size: 30px;
            width: 50px;
            height: 50px;
            background: gold;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #000;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
        }

        .item-price {
            font-size: 18px;
            font-weight: bold;
            color: gold;
            text-shadow: 1px 1px 0 #000;
        }

        .reset-button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            border: 3px solid white;
        }

        .reset-button:active {
            transform: scale(0.98);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -150%); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>⚡ BLASEN ⚡</h1>
            <div class="rebirth-info" id="rebirthInfo">Rebirth: 0 | Bonus: 1x</div>
        </div>

        <!-- Hauptmenü -->
        <div class="main-menu">
            <div class="menu-button active" id="mainMenuBtn">🏠 HAUPT</div>
            <div class="menu-button" id="arenaMenuBtn">⚔️ ARENA</div>
        </div>

        <!-- MAIN VIEW -->
        <div class="main-view" id="mainView">
            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-label">STÄRKE</div>
                    <div class="stat-value" id="strength">1</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">COINS</div>
                    <div class="stat-value" id="coins">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">AUTO CLICKER</div>
                    <div class="stat-value" id="autoClickers">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">KLICK/S</div>
                    <div class="stat-value" id="clicksPerSecond">0</div>
                </div>
            </div>

            <div class="character-section">
                <div class="character-area" id="clickArea">
                    <!-- BLASEN ORIGINAL SKIN -->
                    <div class="blasen-character">
                        <!-- Haar -->
                        <div class="blasen-hair"></div>
                        <div class="blasen-hair-front"></div>
                        
                        <!-- Kopf -->
                        <div class="blasen-head"></div>
                        
                        <!-- Augenbrauen -->
                        <div class="blasen-eyebrow-left"></div>
                        <div class="blasen-eyebrow-right"></div>
                        
                        <!-- Augen -->
                        <div class="blasen-eye-left"></div>
                        <div class="blasen-eye-right"></div>
                        <div class="blasen-pupil-left"></div>
                        <div class="blasen-pupil-right"></div>
                        
                        <!-- Nase -->
                        <div class="blasen-nose"></div>
                        
                        <!-- Mund -->
                        <div class="blasen-mouth"></div>
                        
                        <!-- Kragen -->
                        <div class="blasen-collar"></div>
                        
                        <!-- Körper -->
                        <div class="blasen-body"></div>
                        
                        <!-- Arme -->
                        <div class="blasen-arm-left"></div>
                        <div class="blasen-arm-right"></div>
                        
                        <!-- Handschuhe -->
                        <div class="blasen-glove-left"></div>
                        <div class="blasen-glove-right"></div>
                        
                        <!-- Beine -->
                        <div class="blasen-leg-left"></div>
                        <div class="blasen-leg-right"></div>
                        
                        <!-- Schuhe -->
                        <div class="blasen-shoe-left"></div>
                        <div class="blasen-shoe-right"></div>
                    </div>
                    <div class="click-text">👆 TIPPEN FÜR STÄRKE 👆</div>
                    <div class="click-counter" id="clickCounter">0</div>
                </div>

                <div class="auto-toggle-button" id="autoToggle">
                    <div class="auto-icon" id="autoIcon">🤚</div>
                    <div class="auto-status" id="autoStatus">AUS</div>
                    <div class="auto-speed" id="autoSpeed">0/Sek</div>
                </div>
            </div>

            <div class="shop-container">
                <div class="shop-title">🛒 SHOP 🛒</div>
                <div class="shop-items" id="shopItems"></div>
                <button class="reset-button" id="resetButton">🔄 NEUES SPIEL 🔄</button>
            </div>
        </div>

        <!-- ARENA VIEW -->
        <div class="arena-view" id="arenaView">
            <div class="arena-stats">
                <div class="arena-stat">
                    <div>❤️ LEBEN</div>
                    <div id="arenaHealth">100</div>
                </div>
                <div class="arena-stat">
                    <div>⚔️ STÄRKE</div>
                    <div id="arenaStrength">1</div>
                </div>
                <div class="arena-stat">
                    <div>🏆 SIEGE</div>
                    <div id="arenaWins">0</div>
                </div>
            </div>

            <div class="arena-canvas-container">
                <canvas id="arenaCanvas" width="400" height="350"></canvas>
            </div>

            <div class="arena-controls">
                <div class="arena-joystick" id="arenaJoystick">
                    <div class="joystick-base"></div>
                    <div class="joystick-handle" id="joystickHandle"></div>
                </div>
                <div class="arena-attack-button" id="arenaAttackButton">
                    <div class="attack-icon">⚔️</div>
                    <div class="attack-text">ANGREIFEN</div>
                </div>
            </div>

            <div class="enemy-list" id="enemyList"></div>

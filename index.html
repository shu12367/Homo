<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLASEN - Arena Kampf</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            touch-action: none;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            border: 5px solid gold;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            border-radius: 30px;
            border: 3px solid white;
        }

        h1 {
            color: gold;
            font-size: 48px;
            text-shadow: 3px 3px 0 #000, 5px 5px 0 purple;
            margin-bottom: 5px;
        }

        .main-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .menu-button {
            flex: 1;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 15px;
            border-radius: 20px;
            border: 3px solid gold;
            text-align: center;
            cursor: pointer;
            text-shadow: 1px 1px 0 #000;
        }

        .menu-button.active {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            border-color: white;
        }

        /* MAIN GAME VIEW */
        .main-view {
            display: block;
        }

        .main-view.hidden {
            display: none;
        }

        /* ARENA VIEW */
        .arena-view {
            display: none;
        }

        .arena-view.active {
            display: block;
        }

        .arena-stats {
            background: #2c3e50;
            border-radius: 20px;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            border: 3px solid gold;
        }

        .arena-stat {
            background: #fff;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        .arena-canvas-container {
            position: relative;
            width: 100%;
            height: 400px;
            background: #8B4513;
            border-radius: 30px;
            border: 4px solid gold;
            overflow: hidden;
            margin-bottom: 15px;
        }

        #arenaCanvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #D2B48C;
            touch-action: none;
        }

        .arena-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .arena-joystick {
            flex: 2;
            background: #4a4a4a;
            border-radius: 30px;
            padding: 20px;
            border: 4px solid gold;
            position: relative;
            height: 120px;
            touch-action: none;
        }

        .joystick-base {
            width: 60px;
            height: 60px;
            background: #666;
            border-radius: 30px;
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            border: 3px solid #333;
        }

        .joystick-handle {
            width: 40px;
            height: 40px;
            background: #ff6b6b;
            border-radius: 20px;
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            border: 3px solid white;
            cursor: pointer;
            transition: 0.05s;
            touch-action: none;
        }

        .arena-attack-button {
            flex: 1;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid gold;
            cursor: pointer;
            touch-action: none;
        }

        .arena-attack-button:active {
            transform: scale(0.95);
        }

        .attack-icon {
            font-size: 40px;
        }

        .attack-text {
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
        }

        .enemy-list {
            background: #34495e;
            border-radius: 20px;
            padding: 15px;
            border: 3px solid gold;
            max-height: 200px;
            overflow-y: auto;
        }

        .enemy-item {
            background: #fff;
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid gold;
        }

        .enemy-item.current {
            background: #f1c40f;
            border: 3px solid #e67e22;
        }

        .enemy-health-bar {
            width: 100px;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
        }

        .enemy-health-fill {
            height: 100%;
            background: linear-gradient(90deg, #27ae60 0%, #2ecc71 100%);
        }

        .tournament-info {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
            border: 3px solid gold;
            text-align: center;
        }

        .tournament-button {
            background: linear-gradient(135deg, #f1c40f 0%, #e67e22 100%);
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 15px;
            border-radius: 30px;
            border: 3px solid white;
            cursor: pointer;
            margin-top: 10px;
            text-shadow: 1px 1px 0 #000;
        }

        .tournament-button:active {
            transform: scale(0.95);
        }

        .tournament-button.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .back-button {
            background: #95a5a6;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
            border-radius: 20px;
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            border: 2px solid white;
        }

        .stats-container {
            background: #2c3e50;
            border-radius: 30px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            border: 3px solid gold;
        }

        .stat-box {
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 2px solid gold;
        }

        .stat-label {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
        }

        .auto-toggle-button {
            background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
            border-radius: 30px;
            padding: 15px;
            border: 4px solid gold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .auto-toggle-button.active {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
        }

        .shop-container {
            background: #2c3e50;
            border-radius: 30px;
            padding: 20px;
            border: 3px solid gold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>⚡ BLASEN ⚡</h1>
            <div class="rebirth-info" id="rebirthInfo">Rebirth: 0 | Bonus: 1x</div>
        </div>

        <!-- Hauptmenü -->
        <div class="main-menu">
            <div class="menu-button active" id="mainMenuBtn">🏠 HAUPT</div>
            <div class="menu-button" id="arenaMenuBtn">⚔️ ARENA</div>
        </div>

        <!-- MAIN VIEW -->
        <div class="main-view" id="mainView">
            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-label">STÄRKE</div>
                    <div class="stat-value" id="strength">1</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">COINS</div>
                    <div class="stat-value" id="coins">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">AUTO CLICKER</div>
                    <div class="stat-value" id="autoClickers">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">KLICK/S</div>
                    <div class="stat-value" id="clicksPerSecond">0</div>
                </div>
            </div>

            <div class="character-section" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <div class="character-area" id="clickArea" style="flex: 2; background: #3498db; border-radius: 30px; padding: 15px; border: 4px solid gold; cursor: pointer;">
                    <div style="font-size: 80px; text-align: center;">😎</div>
                    <div class="click-text" style="text-align: center;">👆 TIPPEN 👆</div>
                    <div class="click-counter" id="clickCounter" style="text-align: center;">0</div>
                </div>

                <div class="auto-toggle-button" id="autoToggle" style="flex: 1;">
                    <div class="auto-icon" id="autoIcon">🤚</div>
                    <div class="auto-status" id="autoStatus">AUS</div>
                    <div class="auto-speed" id="autoSpeed">0/Sek</div>
                </div>
            </div>

            <div class="shop-container">
                <div class="shop-title" style="color: gold; font-size: 28px; text-align: center;">🛒 SHOP 🛒</div>
                <div class="shop-items" id="shopItems"></div>
                <button class="reset-button" id="resetButton" style="background: #e74c3c; color: white; padding: 15px; border-radius: 30px; width: 100%; margin-top: 15px;">🔄 NEUES SPIEL 🔄</button>
            </div>
        </div>

        <!-- ARENA VIEW -->
        <div class="arena-view" id="arenaView">
            <div class="arena-stats">
                <div class="arena-stat">
                    <div>❤️ LEBEN</div>
                    <div id="arenaHealth">100</div>
                </div>
                <div class="arena-stat">
                    <div>⚔️ STÄRKE</div>
                    <div id="arenaStrength">1</div>
                </div>
                <div class="arena-stat">
                    <div>🏆 SIEGE</div>
                    <div id="arenaWins">0</div>
                </div>
            </div>

            <div class="arena-canvas-container">
                <canvas id="arenaCanvas" width="400" height="350"></canvas>
            </div>

            <div class="arena-controls">
                <div class="arena-joystick" id="arenaJoystick">
                    <div class="joystick-base"></div>
                    <div class="joystick-handle" id="joystickHandle"></div>
                </div>
                <div class="arena-attack-button" id="arenaAttackButton">
                    <div class="attack-icon">⚔️</div>
                    <div class="attack-text">ANGREIFEN</div>
                </div>
            </div>

            <div class="enemy-list" id="enemyList"></div>

            <div class="tournament-info">
                <div id="tournamentStatus">🏆 TURNIER: Runde 1/5</div>
                <div id="tournamentReward">Gewinn: 2000 Stärke + Auto Clicker Boost</div>
                <button class="tournament-button" id="startTournamentBtn">🏆 TURNIER STARTEN 🏆</button>
            </div>

            <div class="back-button" id="backFromArena">← ZURÜCK ZUM HAUPTSPIEL</div>
        </div>
    </div>

    <script>
        // Spielvariablen
        let strength = 1;
        let coins = 0;
        let autoClickers = 0;
        let clickCount = 0;
        let rebirths = 0;
        let rebirthBonus = 1;
        let arenaWins = 0;
        
        // Auto Clicker
        let autoClickerActive = false;
        let autoClickerInterval = null;
        
        // Arena Variablen
        let inArena = false;
        let playerArena = {
            x: 200,
            y: 175,
            health: 100,
            maxHealth: 100,
            attackCooldown: 0
        };
        
        let arenaEnemies = [];
        let currentEnemyIndex = 0;
        let tournamentRound = 1;
        let inTournament = false;
        let tournamentEnemies = [];
        
        // Joystick
        let joystickActive = false;
        let joystickVector = { x: 0, y: 0 };
        
        // Shop Items
        let shopItems = [
            {
                id: 'strength',
                name: '💪 STÄRKE +10',
                icon: '💪',
                basePrice: 10,
                price: 10,
                level: 0,
                maxLevel: 1000,
                type: 'strength'
            },
            {
                id: 'auto1',
                name: '🤖 AUTO CLICKER',
                icon: '🤖',
                basePrice: 50,
                price: 50,
                level: 0,
                maxLevel: 100,
                type: 'auto',
                power: 1
            },
            {
                id: 'auto2',
                name: '⚡ TURBO CLICKER',
                icon: '⚡',
                basePrice: 200,
                price: 200,
                level: 0,
                maxLevel: 100,
                type: 'auto',
                power: 2
            },
            {
                id: 'auto3',
                name: '🚀 MEGA CLICKER',
                icon: '🚀',
                basePrice: 500,
                price: 500,
                level: 0,
                maxLevel: 100,
                type: 'auto',
                power: 5
            }
        ];

        // DOM Elemente
        const mainView = document.getElementById('mainView');
        const arenaView = document.getElementById('arenaView');
        const mainMenuBtn = document.getElementById('mainMenuBtn');
        const arenaMenuBtn = document.getElementById('arenaMenuBtn');
        const backFromArena = document.getElementById('backFromArena');
        
        const clickArea = document.getElementById('clickArea');
        const strengthElement = document.getElementById('strength');
        const coinsElement = document.getElementById('coins');
        const autoClickersElement = document.getElementById('autoClickers');
        const clicksPerSecondElement = document.getElementById('clicksPerSecond');
        
        const arenaHealth = document.getElementById('arenaHealth');
        const arenaStrength = document.getElementById('arenaStrength');
        const arenaWinsElement = document.getElementById('arenaWins');
        
        const autoToggle = document.getElementById('autoToggle');
        const autoIcon = document.getElementById('autoIcon');
        const autoStatus = document.getElementById('autoStatus');
        const autoSpeed = document.getElementById('autoSpeed');
        
        const arenaCanvas = document.getElementById('arenaCanvas');
        const ctx = arenaCanvas.getContext('2d');
        
        const joystickHandle = document.getElementById('joystickHandle');
        const arenaJoystick = document.getElementById('arenaJoystick');
        const arenaAttackButton = document.getElementById('arenaAttackButton');
        
        const enemyList = document.getElementById('enemyList');
        const startTournamentBtn = document.getElementById('startTournamentBtn');
        const tournamentStatus = document.getElementById('tournamentStatus');
        
        const shopContainer = document.getElementById('shopItems');
        const resetButton = document.getElementById('resetButton');

        // Menü Navigation
        mainMenuBtn.addEventListener('click', () => {
            mainView.classList.remove('hidden');
            arenaView.classList.remove('active');
            mainMenuBtn.classList.add('active');
            arenaMenuBtn.classList.remove('active');
            inArena = false;
        });

        arenaMenuBtn.addEventListener('click', () => {
            mainView.classList.add('hidden');
            arenaView.classList.add('active');
            mainMenuBtn.classList.remove('active');
            arenaMenuBtn.classList.add('active');
            inArena = true;
            spawnArenaEnemies();
        });

        backFromArena.addEventListener('click', () => {
            mainView.classList.remove('hidden');
            arenaView.classList.remove('active');
            mainMenuBtn.classList.add('active');
            arenaMenuBtn.classList.remove('active');
            inArena = false;
        });

        // Click Event
        clickArea.addEventListener('click', (e) => {
            e.preventDefault();
            handleClick();
        });

        function handleClick() {
            strength += 1 * rebirthBonus;
            clickCount++;
            if (clickCount % 2 === 0) {
                coins += 1;
            }
            updateDisplay();
            updateShop();
        }

        // AUTO CLICKER
        autoToggle.addEventListener('click', () => {
            toggleAutoClicker();
        });

        function toggleAutoClicker() {
            autoClickerActive = !autoClickerActive;
            
            if (autoClickerActive) {
                autoIcon.textContent = '👉';
                autoStatus.textContent = 'AUTO-AN';
                autoToggle.classList.add('active');
                
                if (autoClickerInterval) clearInterval(autoClickerInterval);
                
                autoClickerInterval = setInterval(() => {
                    for (let i = 0; i < autoClickers; i++) {
                        handleClick();
                    }
                }, 1000);
            } else {
                autoIcon.textContent = '🤚';
                autoStatus.textContent = 'AUS';
                autoToggle.classList.remove('active');
                
                if (autoClickerInterval) {
                    clearInterval(autoClickerInterval);
                    autoClickerInterval = null;
                }
            }
        }

        // ARENA FUNKTIONEN
        function spawnArenaEnemies() {
            arenaEnemies = [];
            for (let i = 0; i < 5; i++) {
                let enemyStrength = 50 + (i * 30) + (rebirths * 50);
                arenaEnemies.push({
                    id: i,
                    name: `Gegner ${i + 1}`,
                    x: 50 + Math.random() * 300,
                    y: 50 + Math.random() * 250,
                    strength: enemyStrength,
                    health: 50 + (i * 30),
                    maxHealth: 50 + (i * 30),
                    speed: 1 + Math.random(),
                    attackCooldown: 0,
                    defeated: false
                });
            }
            currentEnemyIndex = 0;
            updateEnemyList();
        }

        function updateEnemyList() {
            let html = '';
            arenaEnemies.forEach((enemy, index) => {
                if (!enemy.defeated) {
                    let healthPercent = (enemy.health / enemy.maxHealth) * 100;
                    html += `
                        <div class="enemy-item ${index === currentEnemyIndex ? 'current' : ''}">
                            <div>${enemy.name}</div>
                            <div>⚔️ ${enemy.strength}</div>
                            <div class="enemy-health-bar">
                                <div class="enemy-health-fill" style="width: ${healthPercent}%"></div>
                            </div>
                        </div>
                    `;
                }
            });
            enemyList.innerHTML = html;
        }

        // Joystick Steuerung
        arenaJoystick.addEventListener('touchstart', handleJoystickStart);
        arenaJoystick.addEventListener('touchmove', handleJoystickMove);
        arenaJoystick.addEventListener('touchend', handleJoystickEnd);
        arenaJoystick.addEventListener('mousedown', handleJoystickStart);
        arenaJoystick.addEventListener('mousemove', handleJoystickMove);
        arenaJoystick.addEventListener('mouseup', handleJoystickEnd);
        arenaJoystick.addEventListener('mouseleave', handleJoystickEnd);

        function handleJoystickStart(e) {
            e.preventDefault();
            joystickActive = true;
        }

        function handleJoystickMove(e) {
            e.preventDefault();
            if (!joystickActive) return;

            const rect = arenaJoystick.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let touchX, touchY;
            
            if (e.touches) {
                touchX = e.touches[0].clientX;
                touchY = e.touches[0].clientY;
            } else {
                touchX = e.clientX;
                touchY = e.clientY;
            }

            let dx = touchX - centerX;
            let dy = touchY - centerY;
            
            const maxDistance = 30;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance > maxDistance) {
                dx = (dx / distance) * maxDistance;
                dy = (dy / distance) * maxDistance;
            }
            
            joystickHandle.style.transform = `translate(${dx}px, ${dy}px)`;
            joystickVector.x = dx / maxDistance;
            joystickVector.y = dy / maxDistance;
        }

        function handleJoystickEnd(e) {
            e.preventDefault();
            joystickActive = false;
            joystickVector.x = 0;
            joystickVector.y = 0;
            joystickHandle.style.transform = 'translate(0px, 0px)';
        }

        // Attack Button
        arenaAttackButton.addEventListener('click', () => {
            if (playerArena.attackCooldown <= 0) {
                attackEnemy();
            }
        });

        arenaAttackButton.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (playerArena.attackCooldown <= 0) {
                attackEnemy();
            }
        });

        function attackEnemy() {
            let currentEnemy = arenaEnemies[currentEnemyIndex];
            if (currentEnemy && !currentEnemy.defeated) {
                let damage = Math.floor(strength / 5) + 10;
                currentEnemy.health -= damage;
                playerArena.attackCooldown = 20;
                
                if (currentEnemy.health <= 0) {
                    currentEnemy.defeated = true;
                    coins += 50 + (currentEnemyIndex * 20);
                    
                    // Nächsten Gegner finden
                    let nextEnemy = arenaEnemies.findIndex(e => !e.defeated);
                    if (nextEnemy !== -1) {
                        currentEnemyIndex = nextEnemy;
                    }
                }
                
                updateEnemyList();
            }
        }

        // Gegner Bewegung und Angriff
        function updateArena() {
            if (!inArena) return;

            // Spieler Bewegung
            if (joystickActive) {
                playerArena.x += joystickVector.x * 3;
                playerArena.y += joystickVector.y * 3;
                
                // In Canvas bleiben
                playerArena.x = Math.max(20, Math.min(arenaCanvas.width - 20, playerArena.x));
                playerArena.y = Math.max(20, Math.min(arenaCanvas.height - 20, playerArena.y));
            }

            // Gegner Bewegung und Angriff
            arenaEnemies.forEach((enemy, index) => {
                if (!enemy.defeated) {
                    // Bewegung zum Spieler
                    let dx = playerArena.x - enemy.x;
                    let dy = playerArena.y - enemy.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance > 0) {
                        enemy.x += (dx / distance) * enemy.speed;
                        enemy.y += (dy / distance) * enemy.speed;
                    }
                    
                    // Angriff
                    if (distance < 40 && enemy.attackCooldown <= 0) {
                        playerArena.health -= Math.floor(enemy.strength / 10);
                        enemy.attackCooldown = 30;
                        
                        if (playerArena.health <= 0) {
                            // Spieler besiegt
                            playerArena.health = playerArena.maxHealth;
                            spawnArenaEnemies();
                        }
                    }
                    
                    if (enemy.attackCooldown > 0) enemy.attackCooldown--;
                }
            });

            if (playerArena.attackCooldown > 0) playerArena.attackCooldown--;

            drawArena();
            updateArenaDisplay();
            requestAnimationFrame(updateArena);
        }

        function drawArena() {
            ctx.clearRect(0, 0, arenaCanvas.width, arenaCanvas.height);
            
            // Boden
            ctx.fillStyle = '#D2B48C';
            ctx.fillRect(0, 0, arenaCanvas.width, arenaCanvas.height);
            
            // Arena Rand
            ctx.strokeStyle = 'gold';
            ctx.lineWidth = 5;
            ctx.strokeRect(5, 5, arenaCanvas.width - 10, arenaCanvas.height - 10);
            
            // Spieler zeichnen
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.arc(playerArena.x, playerArena.y, 20, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Spieler Gesundheit
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(playerArena.x - 25, playerArena.y - 35, 50, 5);
            
            // Gegner zeichnen
            arenaEnemies.forEach((enemy, index) => {
                if (!enemy.defeated) {
                    // Farbe basierend auf Gegner
                    ctx.fillStyle = index === currentEnemyIndex ? '#e74c3c' : '#c0392b';
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, 15, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Gesundheitsbalken
                    let healthPercent = enemy.health / enemy.maxHealth;
                    ctx.fillStyle = '#27ae60';
                    ctx.fillRect(enemy.x - 20, enemy.y - 30, 40 * healthPercent, 4);
                    
                    // Stärke anzeigen
                    ctx.fillStyle = 'white';
                    ctx.font = '12px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(`⚔️${enemy.strength}`, enemy.x, enemy.y - 40);
                }
            });
        }

        function updateShop() {
            shopContainer.innerHTML = '';
            shopItems.forEach((item, index) => {

                itemElement.className = `shop-item ${item.level >= item.maxLevel ? 'disabled' : ''}`;
                itemElement.style.background = '#fff';
                itemElement.style.borderRadius = '15px';
                itemElement.style.padding = '12px';
                itemElement.style.marginBottom = '10px';
                itemElement.style.display = 'flex';
                itemElement.style.alignItems = 'center';
                itemElement.style.gap = '10px';
                itemElement.style.cursor = 'pointer';
                itemElement.style.border = '2px solid gold';
                
                itemElement.innerHTML = `

                    <div style="flex:1">
                        <div style="font-weight:bold;">${item.name} (${item.level})</div>
                    </div>
                    <div style="font-size:18px; font-weight:bold; color:gold;">${item.price} 🪙</div>
                `;
                
                itemElement.addEventListener('click', () => buyItem(index));
                shopContainer.appendChild(itemElement);
            });
        }

        function buyItem(index) {
            const item = shopItems[index];
            if (coins >= item.price && item.level < item.maxLevel) {
                coins -= item.price;
                item.level++;
                
                if (item.type === 'strength') {
                    strength += 10;
                } else if (item.type === 'auto') {
                    autoClickers += item.power;
                    if (autoClickerActive) {
                        toggleAutoClicker();
                        toggleAutoClicker();
                    }
                }
                
                item.price = Math.floor(item.basePrice * Math.pow(1.3, item.level));
                updateDisplay();
                updateShop();
            }
        }

            anim.style.color = color;
            anim.style.textShadow = '2px 2px 0 #000';

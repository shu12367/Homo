<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blasen - Der Auto Clicker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            border: 5px solid #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #ff4757;
            font-size: 42px;
            text-shadow: 3px 3px 0 #fff;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .stats-container {
            background: #2f3542;
            border-radius: 30px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            border: 3px solid #fff;
        }

        .stat-box {
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: inset 0 -3px 0 #ddd;
        }

        .stat-label {
            font-size: 14px;
            color: #747d8c;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #2f3542;
        }

        .stat-value#coins {
            color: #ffa502;
        }

        .stat-value#strength {
            color: #ff4757;
        }

        .character-area {
            background: #70a1ff;
            border-radius: 50px;
            padding: 30px;
            margin-bottom: 20px;
            border: 5px solid #fff;
            cursor: pointer;
            transition: transform 0.1s;
            text-align: center;
        }

        .character-area:active {
            transform: scale(0.95);
        }

        .character {
            font-size: 120px;
            line-height: 1;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .click-text {
            font-size: 24px;
            color: white;
            font-weight: bold;
            margin-top: 10px;
            text-shadow: 2px 2px 0 #000;
        }

        .click-counter {
            font-size: 36px;
            color: #fff;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 10px;
        }

        .shop-container {
            background: #2f3542;
            border-radius: 30px;
            padding: 20px;
            border: 3px solid #fff;
        }

        .shop-title {
            color: #ffd32a;
            font-size: 28px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .shop-items {
            display: grid;
            gap: 15px;
        }

        .shop-item {
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            border: 2px solid #ffd32a;
        }

        .shop-item:active {
            transform: scale(0.98);
        }

        .shop-item.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .item-icon {
            font-size: 40px;
            width: 60px;
            height: 60px;
            background: #ffd32a;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2f3542;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-size: 18px;
            font-weight: bold;
            color: #2f3542;
            margin-bottom: 5px;
        }

        .item-desc {
            font-size: 14px;
            color: #747d8c;
        }

        .item-price {
            font-size: 20px;
            font-weight: bold;
            color: #ffa502;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .owned-badge {
            background: #4cd137;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .upgrade-stats {
            margin-top: 15px;
            text-align: center;
            color: #fff;
            font-size: 16px;
        }

        .reset-button {
            background: #ff4757;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            border: 3px solid #fff;
        }

        .reset-button:active {
            transform: scale(0.98);
        }

        @media (max-width: 400px) {
            .character {
                font-size: 100px;
            }
            
            .stats-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>💨 BLASEN 💨</h1>
        </div>

        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-label">STÄRKE</div>
                <div class="stat-value" id="strength">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">COINS</div>
                <div class="stat-value" id="coins">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">AUTO CLICKER</div>
                <div class="stat-value" id="autoClickers">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">PRO SEKUNDE</div>
                <div class="stat-value" id="perSecond">0</div>
            </div>
        </div>

        <div class="character-area" id="clickArea">
            <div class="character" id="character">😤</div>
            <div class="click-text">👆 TIPPEN FÜR STÄRKE 👆</div>
            <div class="click-counter" id="clickCounter">0</div>
        </div>

        <div class="shop-container">
            <div class="shop-title">🛒 SHOP 🛒</div>
            <div class="shop-items" id="shopItems">
                <!-- Items werden per JS eingefügt -->
            </div>
            <div class="upgrade-stats" id="upgradeStats">
                Nächstes Upgrade: 10 Coins
            </div>
            <button class="reset-button" id="resetButton">
                🔄 NEUES SPIEL 🔄
            </button>
        </div>
    </div>

    <script>
        // Spielvariablen
        let strength = 1;
        let coins = 0;
        let autoClickers = 0;
        let clickCount = 0;
        
        // Shop Items
        let shopItems = [
            {
                id: 'strength',
                name: '💪 MEHR STÄRKE',
                desc: 'Pro Tipp mehr Kraft',
                icon: '💪',
                basePrice: 10,
                price: 10,
                level: 0,
                maxLevel: 100,
                type: 'strength'
            },
            {
                id: 'auto1',
                name: '🤖 AUTO CLICKER I',
                desc: '1x pro Sekunde automatisch',
                icon: '🤖',
                basePrice: 50,
                price: 50,
                level: 0,
                maxLevel: 10,
                type: 'auto',
                power: 1
            },
            {
                id: 'auto2',
                name: '⚡ AUTO CLICKER II',
                desc: '2x pro Sekunde automatisch',
                icon: '⚡',
                basePrice: 200,
                price: 200,
                level: 0,
                maxLevel: 10,
                type: 'auto',
                power: 2
            },
            {
                id: 'auto3',
                name: '🚀 AUTO CLICKER III',
                desc: '5x pro Sekunde automatisch',
                icon: '🚀',
                basePrice: 500,
                price: 500,
                level: 0,
                maxLevel: 10,
                type: 'auto',
                power: 5
            }
        ];

        // DOM Elemente
        const clickArea = document.getElementById('clickArea');
        const strengthElement = document.getElementById('strength');
        const coinsElement = document.getElementById('coins');
        const autoClickersElement = document.getElementById('autoClickers');
        const perSecondElement = document.getElementById('perSecond');
        const clickCounterElement = document.getElementById('clickCounter');
        const character = document.getElementById('character');
        const shopContainer = document.getElementById('shopItems');
        const upgradeStats = document.getElementById('upgradeStats');
        const resetButton = document.getElementById('resetButton');

        // Click Event
        clickArea.addEventListener('click', (e) => {
            e.preventDefault();
            handleClick();
        });

        clickArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick();
        });

        function handleClick() {
            // Stärke erhöhen
            strength += 1;
            
            // Coins erhalten (alle 2 Tipps)
            clickCount++;
            if (clickCount % 2 === 0) {
                coins += 1;
                showCoinAnimation();
            }
            
            // Character ändern je nach Stärke
            updateCharacter();
            
            // Stats aktualisieren
            updateDisplay();
            
            // Shop aktualisieren
            updateShop();
        }

        // Coin Animation
        function showCoinAnimation() {
            const coin = document.createElement('div');
            coin.textContent = '+1 🪙';
            coin.style.position = 'fixed';
            coin.style.left = '50%';
            coin.style.top = '50%';
            coin.style.transform = 'translate(-50%, -50%)';
            coin.style.fontSize = '40px';
            coin.style.fontWeight = 'bold';
            coin.style.color = '#ffd32a';
            coin.style.textShadow = '2px 2px 0 #000';
            coin.style.zIndex = '1000';
            coin.style.animation = 'floatUp 1s ease-out forwards';
            document.body.appendChild(coin);
            
            setTimeout(() => {
                coin.remove();
            }, 1000);
        }

        // Character updaten
        function updateCharacter() {
            if (strength < 50) {
                character.textContent = '😤';
            } else if (strength < 200) {
                character.textContent = '😠';
            } else if (strength < 500) {
                character.textContent = '👊';
            } else if (strength < 1000) {
                character.textContent = '💪';
            } else {
                character.textContent = '🦾';
            }
        }

        // Shop anzeigen
        function updateShop() {
            shopContainer.innerHTML = '';
            
            shopItems.forEach((item, index) => {
                const itemElement = document.createElement('div');
                itemElement.className = `shop-item ${item.level >= item.maxLevel ? 'disabled' : ''}`;
                
                itemElement.innerHTML = `
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-desc">${item.desc} (Level ${item.level}/${item.maxLevel})</div>
                    </div>
                    <div class="item-price">
                        <span>${item.price}</span>
                        <span>🪙</span>
                    </div>
                `;
                
                itemElement.addEventListener('click', () => buyItem(index));
                
                shopContainer.appendChild(itemElement);
            });
            
            // Nächstes Upgrade anzeigen
            const nextItem = shopItems.find(item => item.level < item.maxLevel);
            if (nextItem) {
                upgradeStats.textContent = `Nächstes Upgrade: ${nextItem.name} - ${nextItem.price} Coins`;
            } else {
                upgradeStats.textContent = 'Alle Upgrades gekauft! 🎉';
            }
        }

        // Item kaufen
        function buyItem(index) {
            const item = shopItems[index];
            
            if (coins >= item.price && item.level < item.maxLevel) {
                coins -= item.price;
                item.level++;
                
                // Effekt anwenden
                if (item.type === 'strength') {
                    strength += 10; // Extra Stärke beim Kauf
                } else if (item.type === 'auto') {
                    autoClickers += item.power;
                }
                
                // Preis erhöhen
                item.price = Math.floor(item.basePrice * Math.pow(1.5, item.level));
                
                // Display updaten
                updateDisplay();
                updateShop();
                
                // Animation
                showPurchaseAnimation();
            }
        }

        // Kauf Animation
        function showPurchaseAnimation() {
            const msg = document.createElement('div');
            msg.textContent = 'Gekauft! 🎉';
            msg.style.position = 'fixed';
            msg.style.left = '50%';
            msg.style.top = '40%';
            msg.style.transform = 'translate(-50%, -50%)';
            msg.style.fontSize = '30px';
            msg.style.fontWeight = 'bold';
            msg.style.color = '#4cd137';
            msg.style.textShadow = '2px 2px 0 #000';
            msg.style.zIndex = '1000';
            msg.style.animation = 'floatUp 1s ease-out forwards';
            document.body.appendChild(msg);
            
            setTimeout(() => {
                msg.remove();
            }, 1000);
        }

        // Auto Clicker Funktion
        function autoClick() {
            if (autoClickers > 0) {
                // Pro Sekunde automatisch klicken
                strength += autoClickers;
                
                // Auch Coins generieren (alle 2 automatischen Klicks)
                for (let i = 0; i < autoClickers; i++) {
                    clickCount++;
                    if (clickCount % 2 === 0) {
                        coins++;
                    }
                }
                
                updateDisplay();
                updateCharacter();
                updateShop();
            }
        }

        // Display aktualisieren
        function updateDisplay() {
            strengthElement.textContent = strength;
            coinsElement.textContent = coins;
            autoClickersElement.textContent = autoClickers;
            
            // Klicks pro Sekunde berechnen
            let perSecond = 0;
            shopItems.forEach(item => {
                if (item.type === 'auto') {
                    perSecond += item.power * item.level;
                }
            });
            perSecondElement.textContent = perSecond;
            
            clickCounterElement.textContent = clickCount;
        }

        // Spiel zurücksetzen
        function resetGame() {
            if (confirm('Wirklich neu starten? Dein Fortschritt geht verloren!')) {
                strength = 1;
                coins = 0;
                autoClickers = 0;
                clickCount = 0;
                
                // Shop zurücksetzen
                shopItems = [
                    {
                        id: 'strength',
                        name: '💪 MEHR STÄRKE',
                        desc: 'Pro Tipp mehr Kraft',
                        icon: '💪',
                        basePrice: 10,
                        price: 10,
                        level: 0,
                        maxLevel: 100,
                        type: 'strength'
                    },
                    {
                        id: 'auto1',
                        name: '🤖 AUTO CLICKER I',
                        desc: '1x pro Sekunde automatisch',
                        icon: '🤖',
                        basePrice: 50,
                        price: 50,
                        level: 0,
                        maxLevel: 10,
                        type: 'auto',
                        power: 1
                    },
                    {
                        id: 'auto2',
                        name: '⚡ AUTO CLICKER II',
                        desc: '2x pro Sekunde automatisch',
                        icon: '⚡',
                        basePrice: 200,
                        price: 200,
                        level: 0,
                        maxLevel: 10,
                        type: 'auto',
                        power: 2
                    },
                    {
                        id: 'auto3',
                        name: '🚀 AUTO CLICKER III',
                        desc: '5x pro Sekunde automatisch',
                        icon: '🚀',
                        basePrice: 500,
                        price: 500,
                        level: 0,
                        maxLevel: 10,
                        type: 'auto',
                        power: 5
                    }
                ];
                
                character.textContent = '😤';
                updateDisplay();
                updateShop();
            }
        }

        resetButton.addEventListener('click', resetGame);

        // Animationen
        const style = document.createElement('style');
        style.textContent = `
            @keyframes floatUp {
                0% {
                    opacity: 1;
                    transform: translate(-50%, -50%);
                }
                100% {
                    opacity: 0;
                    transform: translate(-50%, -150%);
                }
            }
        `;
        document.head.appendChild(style);

        // Auto Clicker Interval
        setInterval(autoClick, 1000);

        // Spiel starten
        updateDisplay();
        updateShop();
    </script>
</body>
</html>

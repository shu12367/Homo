<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blasen - Der Auto Clicker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            border: 5px solid #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #ff6b6b;
            font-size: 48px;
            text-shadow: 3px 3px 0 #fff, 5px 5px 0 #000;
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .stats-container {
            background: #2c3e50;
            border-radius: 30px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            border: 3px solid #fff;
            box-shadow: inset 0 -5px 0 #1a252f;
        }

        .stat-box {
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: inset 0 -3px 0 #bdc3c7;
        }

        .stat-label {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
        }

        .stat-value#coins {
            color: #f1c40f;
            text-shadow: 1px 1px 0 #000;
        }

        .stat-value#strength {
            color: #e74c3c;
        }

        .character-area {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            border-radius: 50px;
            padding: 20px;
            margin-bottom: 20px;
            border: 5px solid #fff;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            text-align: center;
            box-shadow: 0 10px 0 #1a5276;
        }

        .character-area:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #1a5276;
        }

        .character {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            position: relative;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* Character Design genau wie auf dem Foto */
        .blasen-character {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Kopf (rund) */
        .head {
            position: absolute;
            width: 140px;
            height: 140px;
            background: #f5deb3;
            border-radius: 50%;
            top: 20px;
            left: 30px;
            border: 4px solid #000;
            box-shadow: inset -5px -5px 0 rgba(0,0,0,0.1);
        }

        /* Haar */
        .hair {
            position: absolute;
            width: 150px;
            height: 50px;
            background: #8b4513;
            top: 10px;
            left: 25px;
            border-radius: 50% 50% 0 0;
            border: 4px solid #000;
            border-bottom: none;
        }

        .hair-front {
            position: absolute;
            width: 60px;
            height: 30px;
            background: #8b4513;
            top: 25px;
            left: 70px;
            border-radius: 50%;
            border: 4px solid #000;
            transform: rotate(10deg);
        }

        /* Augen */
        .eye-left {
            position: absolute;
            width: 25px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            top: 70px;
            left: 60px;
            border: 3px solid #000;
        }

        .eye-right {
            position: absolute;
            width: 25px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            top: 70px;
            left: 110px;
            border: 3px solid #000;
        }

        .pupil-left {
            position: absolute;
            width: 12px;
            height: 15px;
            background: #000;
            border-radius: 50%;
            top: 78px;
            left: 66px;
        }

        .pupil-right {
            position: absolute;
            width: 12px;
            height: 15px;
            background: #000;
            border-radius: 50%;
            top: 78px;
            left: 116px;
        }

        /* Augenbrauen */
        .eyebrow-left {
            position: absolute;
            width: 30px;
            height: 8px;
            background: #000;
            top: 55px;
            left: 55px;
            border-radius: 10px;
            transform: rotate(-5deg);
        }

        .eyebrow-right {
            position: absolute;
            width: 30px;
            height: 8px;
            background: #000;
            top: 55px;
            left: 105px;
            border-radius: 10px;
            transform: rotate(5deg);
        }

        /* Nase */
        .nose {
            position: absolute;
            width: 15px;
            height: 12px;
            background: #d2691e;
            border-radius: 40%;
            top: 95px;
            left: 92px;
            border: 2px solid #000;
        }

        /* Mund */
        .mouth {
            position: absolute;
            width: 40px;
            height: 20px;
            border-bottom: 4px solid #000;
            border-radius: 50%;
            top: 115px;
            left: 75px;
        }

        /* Körper */
        .body {
            position: absolute;
            width: 120px;
            height: 100px;
            background: #4169e1;
            top: 160px;
            left: 40px;
            border: 4px solid #000;
            border-radius: 30px 30px 20px 20px;
            box-shadow: inset -5px -5px 0 #1e3a8a;
        }

        /* Kragen */
        .collar {
            position: absolute;
            width: 80px;
            height: 20px;
            background: #ffd700;
            top: 150px;
            left: 60px;
            border: 3px solid #000;
            border-radius: 10px;
        }

        /* Arme */
        .arm-left {
            position: absolute;
            width: 30px;
            height: 80px;
            background: #4169e1;
            top: 170px;
            left: 20px;
            border: 4px solid #000;
            border-radius: 20px;
            transform: rotate(10deg);
            box-shadow: inset -3px -3px 0 #1e3a8a;
        }

        .arm-right {
            position: absolute;
            width: 30px;
            height: 80px;
            background: #4169e1;
            top: 170px;
            left: 150px;
            border: 4px solid #000;
            border-radius: 20px;
            transform: rotate(-10deg);
            box-shadow: inset -3px -3px 0 #1e3a8a;
        }

        /* Handschuhe */
        .glove-left {
            position: absolute;
            width: 35px;
            height: 35px;
            background: #fff;
            top: 235px;
            left: 15px;
            border: 4px solid #000;
            border-radius: 50%;
        }

        .glove-right {
            position: absolute;
            width: 35px;
            height: 35px;
            background: #fff;
            top: 235px;
            left: 145px;
            border: 4px solid #000;
            border-radius: 50%;
        }

        /* Beine */
        .leg-left {
            position: absolute;
            width: 35px;
            height: 80px;
            background: #2c3e50;
            top: 250px;
            left: 55px;
            border: 4px solid #000;
            border-radius: 0 0 20px 20px;
        }

        .leg-right {
            position: absolute;
            width: 35px;
            height: 80px;
            background: #2c3e50;
            top: 250px;
            left: 105px;
            border: 4px solid #000;
            border-radius: 0 0 20px 20px;
        }

        /* Schuhe */
        .shoe-left {
            position: absolute;
            width: 45px;
            height: 20px;
            background: #000;
            top: 325px;
            left: 48px;
            border: 3px solid #333;
            border-radius: 10px;
        }

        .shoe-right {
            position: absolute;
            width: 45px;
            height: 20px;
            background: #000;
            top: 325px;
            left: 98px;
            border: 3px solid #333;
            border-radius: 10px;
        }

        .click-text {
            font-size: 24px;
            color: white;
            font-weight: bold;
            margin-top: 220px;
            text-shadow: 2px 2px 0 #000, 3px 3px 0 #000;
        }

        .click-counter {
            font-size: 36px;
            color: #ffd700;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 10px;
            border: 3px solid #fff;
        }

        .shop-container {
            background: #2c3e50;
            border-radius: 30px;
            padding: 20px;
            border: 3px solid #fff;
            margin-top: 20px;
            box-shadow: inset 0 -5px 0 #1a252f;
        }

        .shop-title {
            color: #ffd700;
            font-size: 32px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }

        .shop-items {
            display: grid;
            gap: 15px;
        }

        .shop-item {
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            border: 3px solid #ffd700;
            box-shadow: inset 0 -3px 0 #b8860b;
        }

        .shop-item:active {
            transform: translateY(3px);
            box-shadow: inset 0 0 0 #b8860b;
        }

        .shop-item.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .item-icon {
            font-size: 40px;
            width: 70px;
            height: 70px;
            background: #ffd700;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2c3e50;
            border: 3px solid #000;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .item-desc {
            font-size: 14px;
            color: #7f8c8d;
        }

        .item-price {
            font-size: 24px;
            font-weight: bold;
            color: #f1c40f;
            display: flex;
            align-items: center;
            gap: 5px;
            text-shadow: 1px 1px 0 #000;
        }

        .owned-badge {
            background: #27ae60;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            border: 2px solid #fff;
        }

        .upgrade-stats {
            margin-top: 15px;
            text-align: center;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
        }

        .reset-button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            border: 3px solid #fff;
            box-shadow: inset 0 -5px 0 #c0392b;
            text-shadow: 2px 2px 0 #000;
        }

        .reset-button:active {
            transform: translateY(5px);
            box-shadow: inset 0 0 0 #c0392b;
        }

        @media (max-width: 400px) {
            .character {
                transform: scale(0.8);
            }
            
            .stats-container {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>💫 BLASEN 💫</h1>
        </div>

        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-label">STÄRKE</div>
                <div class="stat-value" id="strength">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">COINS</div>
                <div class="stat-value" id="coins">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">AUTO CLICKER</div>
                <div class="stat-value" id="autoClickers">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">PRO SEKUNDE</div>
                <div class="stat-value" id="perSecond">0</div>
            </div>
        </div>

        <div class="character-area" id="clickArea">
            <div class="character" id="character">
                <div class="blasen-character">
                    <!-- Haar -->
                    <div class="hair"></div>
                    <div class="hair-front"></div>
                    
                    <!-- Kopf -->
                    <div class="head"></div>
                    
                    <!-- Augenbrauen -->
                    <div class="eyebrow-left"></div>
                    <div class="eyebrow-right"></div>
                    
                    <!-- Augen -->
                    <div class="eye-left"></div>
                    <div class="eye-right"></div>
                    <div class="pupil-left"></div>
                    <div class="pupil-right"></div>
                    
                    <!-- Nase -->
                    <div class="nose"></div>
                    
                    <!-- Mund -->
                    <div class="mouth"></div>
                    
                    <!-- Kragen -->
                    <div class="collar"></div>
                    
                    <!-- Körper -->
                    <div class="body"></div>
                    
                    <!-- Arme -->
                    <div class="arm-left"></div>
                    <div class="arm-right"></div>
                    
                    <!-- Handschuhe -->
                    <div class="glove-left"></div>
                    <div class="glove-right"></div>
                    
                    <!-- Beine -->
                    <div class="leg-left"></div>
                    <div class="leg-right"></div>
                    
                    <!-- Schuhe -->
                    <div class="shoe-left"></div>
                    <div class="shoe-right"></div>
                </div>
            </div>
            <div class="click-text">👆 TIPPEN FÜR STÄRKE 👆</div>
            <div class="click-counter" id="clickCounter">0</div>
        </div>

        <div class="shop-container">
            <div class="shop-title">🛒 SHOP 🛒</div>
            <div class="shop-items" id="shopItems">
                <!-- Items werden per JS eingefügt -->
            </div>
            <div class="upgrade-stats" id="upgradeStats">
                Nächstes Upgrade: 10 Coins
            </div>
            <button class="reset-button" id="resetButton">
                🔄 NEUES SPIEL 🔄
            </button>
        </div>
    </div>

    <script>
        // Spielvariablen
        let strength = 1;
        let coins = 0;
        let autoClickers = 0;
        let clickCount = 0;
        
        // Shop Items
        let shopItems = [
            {
                id: 'strength',
                name: '💪 MEHR STÄRKE',
                desc: 'Pro Tipp mehr Kraft',
                icon: '💪',
                basePrice: 10,
                price: 10,
                level: 0,
                maxLevel: 100,
                type: 'strength'
            },
            {
                id: 'auto1',
                name: '🤖 AUTO CLICKER I',
                desc: '1x pro Sekunde automatisch',
                icon: '🤖',
                basePrice: 50,
                price: 50,
                level: 0,
                maxLevel: 10,
                type: 'auto',
                power: 1
            },
            {
                id: 'auto2',
                name: '⚡ AUTO CLICKER II',
                desc: '2x pro Sekunde automatisch',
                icon: '⚡',
                basePrice: 200,
                price: 200,
                level: 0,
                maxLevel: 10,
                type: 'auto',
                power: 2
            },
            {
                id: 'auto3',
                name: '🚀 AUTO CLICKER III',
                desc: '5x pro Sekunde automatisch',
                icon: '🚀',
                basePrice: 500,
                price: 500,
                level: 0,
                maxLevel: 10,
                type: 'auto',
                power: 5
            }
        ];

        // DOM Elemente
        const clickArea = document.getElementById('clickArea');
        const strengthElement = document.getElementById('strength');
        const coinsElement = document.getElementById('coins');
        const autoClickersElement = document.getElementById('autoClickers');
        const perSecondElement = document.getElementById('perSecond');
        const clickCounterElement = document.getElementById('clickCounter');
        const shopContainer = document.getElementById('shopItems');
        const upgradeStats = document.getElementById('upgradeStats');
        const resetButton = document.getElementById('resetButton');

        // Click Event
        clickArea.addEventListener('click', (e) => {
            e.preventDefault();
            handleClick();
        });

        clickArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick();
        });

        function handleClick() {
            // Stärke erhöhen
            strength += 1;
            
            // Coins erhalten (alle 2 Tipps)
            clickCount++;
            if (clickCount % 2 === 0) {
                coins += 1;
                showCoinAnimation();
            }
            
            // Stats aktualisieren
            updateDisplay();
            
            // Shop aktualisieren
            updateShop();
        }

        // Coin Animation
        function showCoinAnimation() {
            const coin = document.createElement('div');
            coin.textContent = '+1 🪙';
            coin.style.position = 'fixed';
            coin.style.left = '50%';
            coin.style.top = '50%';
            coin.style.transform = 'translate(-50%, -50%)';
            coin.style.fontSize = '40px';
            coin.style.fontWeight = 'bold';
            coin.style.color = '#ffd700';
            coin.style.textShadow = '2px 2px 0 #000, 3px 3px 0 #000';
            coin.style.zIndex = '1000';
            coin.style.animation = 'floatUp 1s ease-out forwards';
            document.body.appendChild(coin);
            
            setTimeout(() => {
                coin.remove();
            }, 1000);
        }

        // Shop anzeigen
        function updateShop() {
            shopContainer.innerHTML = '';
            
            shopItems.forEach((item, index) => {
                const itemElement = document.createElement('div');
                itemElement.className = `shop-item ${item.level >= item.maxLevel ? 'disabled' : ''}`;
                
                itemElement.innerHTML = `
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-desc">${item.desc} (Level ${item.level}/${item.maxLevel})</div>
                    </div>
                    <div class="item-price">
                        <span>${item.price}</span>
                        <span>🪙</span>
                    </div>
                `;
                
                itemElement.addEventListener('click', () => buyItem(index));
                
                shopContainer.appendChild(itemElement);
            });
            
            // Nächstes Upgrade anzeigen
            const nextItem = shopItems.find(item => item.level < item.maxLevel);
            if (nextItem) {
                upgradeStats.textContent = `Nächstes Upgrade: ${nextItem.name} - ${nextItem.price} Coins`;
            } else {
                upgradeStats.textContent = 'Alle Upgrades gekauft! 🎉';
            }
        }

        // Item kaufen
        function buyItem(index) {
            const item = shopItems[index];
            
            if (coins >= item.price && item.level < item.maxLevel) {
                coins -= item.price;
                item.level++;
                
                // Effekt anwenden
                if (item.type === 'strength') {
                    strength += 10; // Extra Stärke beim Kauf
                } else if (item.type === 'auto') {
                    autoClickers += item.power;
                }
                
                // Preis erhöhen
                item.price = Math.floor(item.basePrice * Math.pow(1.5, item.level));
                
                // Display updaten
                updateDisplay();
                updateShop();
                
                // Animation
                showPurchaseAnimation();
            }
        }

        // Kauf Animation
        function showPurchaseAnimation() {
            const msg = document.createElement('div');
            msg.textContent = 'Gekauft! 🎉';
            msg.style.position = 'fixed';
            msg.style.left = '50%';
            msg.style.top = '40%';
            msg.style.transform = 'translate(-50%, -50%)';
            msg.style.fontSize = '30px';
            msg.style.fontWeight = 'bold';
            msg.style.color = '#27ae60';
            msg.style.textShadow = '2px 2px 0 #000, 3px 3px 0 #000';
            msg.style.zIndex = '1000';
            msg.style.animation = 'floatUp 1s ease-out forwards';
            document.body.appendChild(msg);
            
            setTimeout(() => {
                msg.remove();
            }, 1000);
        }

        // Auto Clicker Funktion
        function autoClick() {
            if (autoClickers > 0) {
                // Pro Sekunde automatisch klicken
                strength += autoClickers;
                
                // Auch Coins generieren (alle 2 automatischen Klicks)
                for (let i = 0; i < autoClickers; i++) {
                    clickCount++;
                    if (clickCount % 2 === 0) {
                        coins++;
                    }
                }
                
                updateDisplay();
                updateShop();
            }
        }

        // Display aktualisieren
        function updateDisplay() {
            strengthElement.textContent = strength;
            coinsElement.textContent = coins;
            autoClickersElement.textContent = autoClickers;
            
            // Klicks pro Sekunde berechnen
            let perSecond = 0;
            shopItems.forEach(item => {
                if (item.type === 'auto') {
                    perSecond += item.power * item.level;
                }
            });
            perSecondElement.textContent = perSecond;
            
            clickCounterElement.textContent = clickCount;
        }

        // Spiel zurücksetzen
        function resetGame() {
            if (confirm('Wirklich neu starten? Dein Fortschritt geht verloren!')) {
                strength = 1;
                coins = 0;
                autoClickers = 0;
                clickCount = 0;
                
                // Shop zurücksetzen
                shopItems = [
                    {
                        id: 'strength',
                        name: '💪 MEHR STÄRKE',
                        desc: 'Pro Tipp mehr Kraft',
                        icon: '💪',
                        basePrice: 10,
                        price: 10,
                        level: 0,
                        maxLevel: 100,
                        type: 'strength'
                    },
                    {
                        id: 'auto1',
                        name: '🤖 AUTO CLICKER I',
                        desc: '1x pro Sekunde automatisch',
                        icon: '🤖',
                        basePrice: 50,
                        price: 50,
                        level: 0,
                        maxLevel: 10,
                        type: 'auto',
                        power: 1
                    },
                    {
                        id: 'auto2',
                        name: '⚡ AUTO CLICKER II',
                        desc: '2x pro Sekunde automatisch',
                        icon: '⚡',
                        basePrice: 200,
                        price: 200,
                        level: 0,
                        maxLevel: 10,
                        type: 'auto',
                        power: 2
                    },
                    {
                        id: 'auto3',
                        name: '🚀 AUTO CLICKER III',
                        desc: '5x pro Sekunde automatisch',
                        icon: '🚀',
                        basePrice: 500,
                        price: 500,
                        level: 0,
                        maxLevel: 10,
                        type: 'auto',
                        power: 5
                    }
                ];
                
                updateDisplay();
                updateShop();
            }
        }

        resetButton.addEventListener('click', resetGame);

        // Animationen
        const style = document.createElement('style');
        style.textContent = `
            @keyframes floatUp {
                0% {
                    opacity: 1;
                    transform: translate(-50%, -50%);
                }
                100% {
                    opacity: 0;
                    transform: translate(-50%, -150%);
                }
            }
        `;
        document.head.appendChild(style);

        // Auto Clicker Interval
        setInterval(autoClick, 1000);

        // Spiel starten
        updateDisplay();
        updateShop();
    </script>
</body>
</html>

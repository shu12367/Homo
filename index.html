<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLASEN - Rebirth & Kämpfe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            border: 5px solid gold;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            border-radius: 30px;
            border: 3px solid white;
        }

        h1 {
            color: gold;
            font-size: 48px;
            text-shadow: 3px 3px 0 #000, 5px 5px 0 purple;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .rebirth-info {
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }

        .stats-container {
            background: #2c3e50;
            border-radius: 30px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            border: 3px solid gold;
        }

        .stat-box {
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 2px solid gold;
        }

        .stat-label {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
        }

        .stat-value#coins {
            color: gold;
            text-shadow: 1px 1px 0 #000;
        }

        .stat-value#strength {
            color: #e74c3c;
        }

        .stat-value#rebirths {
            color: #9b59b6;
        }

        .character-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .character-area {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            border-radius: 30px;
            padding: 15px;
            border: 4px solid gold;
            cursor: pointer;
            transition: transform 0.1s;
            text-align: center;
            flex: 2;
        }

        .character-area:active {
            transform: scale(0.98);
        }

        .auto-clicker-button {
            background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);
            border-radius: 30px;
            padding: 15px;
            border: 4px solid gold;
            cursor: pointer;
            transition: transform 0.1s;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .auto-clicker-button:active {
            transform: scale(0.95);
        }

        .auto-clicker-button.active {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            box-shadow: 0 0 20px #2ecc71;
        }

        .auto-icon {
            font-size: 40px;
        }

        .auto-status {
            font-size: 16px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 0 #000;
            margin-top: 5px;
        }

        .character {
            width: 150px;
            height: 150px;
            margin: 0 auto;
            position: relative;
        }

        /* Character Design */
        .blasen-character {
            width: 100%;
            height: 100%;
            position: relative;
            transform: scale(0.7);
            top: -20px;
        }

        .head {
            position: absolute;
            width: 140px;
            height: 140px;
            background: #f5deb3;
            border-radius: 50%;
            top: 20px;
            left: 5px;
            border: 4px solid #000;
        }

        .hair {
            position: absolute;
            width: 150px;
            height: 50px;
            background: #8b4513;
            top: 10px;
            left: 0px;
            border-radius: 50% 50% 0 0;
            border: 4px solid #000;
        }

        .eyes {
            position: absolute;
            width: 25px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            top: 70px;
            left: 35px;
            border: 3px solid #000;
            box-shadow: 55px 0 0 #fff;
        }

        .pupils {
            position: absolute;
            width: 12px;
            height: 15px;
            background: #000;
            border-radius: 50%;
            top: 78px;
            left: 41px;
            box-shadow: 55px 0 0 #000;
        }

        .mouth {
            position: absolute;
            width: 40px;
            height: 20px;
            border-bottom: 4px solid #000;
            border-radius: 50%;
            top: 115px;
            left: 50px;
        }

        .body {
            position: absolute;
            width: 120px;
            height: 100px;
            background: #4169e1;
            top: 160px;
            left: 15px;
            border: 4px solid #000;
            border-radius: 30px;
        }

        .click-text {
            font-size: 20px;
            color: white;
            font-weight: bold;
            margin-top: 10px;
            text-shadow: 2px 2px 0 #000;
        }

        .click-counter {
            font-size: 24px;
            color: gold;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 5px;
            border: 2px solid white;
        }

        .rebirth-section {
            background: linear-gradient(135deg, #8e44ad 0%, #9b59b6 100%);
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 20px;
            border: 4px solid gold;
            text-align: center;
        }

        .rebirth-button {
            background: linear-gradient(135deg, #f1c40f 0%, #e67e22 100%);
            color: white;
            font-size: 28px;
            font-weight: bold;
            padding: 20px;
            border-radius: 30px;
            border: 4px solid white;
            cursor: pointer;
            transition: transform 0.2s;
            text-shadow: 2px 2px 0 #000;
            width: 100%;
        }

        .rebirth-button:active {
            transform: scale(0.95);
        }

        .rebirth-button.disabled {
            opacity: 0.5;
            pointer-events: none;
            background: #95a5a6;
        }

        .rebirth-bonus {
            color: white;
            font-size: 18px;
            margin-top: 10px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
        }

        .fight-section {
            background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            border: 4px solid gold;
        }

        .fight-title {
            color: gold;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0 #000;
        }

        .enemy-info {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
            border: 2px solid white;
        }

        .enemy-name {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }

        .enemy-stats {
            color: gold;
            font-size: 20px;
            margin: 10px 0;
        }

        .health-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid white;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #27ae60 0%, #2ecc71 100%);
            width: 100%;
            transition: width 0.3s;
        }

        .fight-button {
            background: linear-gradient(135deg, #f1c40f 0%, #e67e22 100%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 15px;
            border-radius: 30px;
            border: 3px solid white;
            cursor: pointer;
            transition: transform 0.2s;
            text-shadow: 2px 2px 0 #000;
            width: 100%;
            margin-top: 10px;
        }

        .fight-button:active {
            transform: scale(0.95);
        }

        .fight-log {
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 10px;
            border-radius: 15px;
            margin-top: 15px;
            font-size: 14px;
            max-height: 80px;
            overflow-y: auto;
            border: 2px solid gold;
        }

        .shop-container {
            background: #2c3e50;
            border-radius: 30px;
            padding: 20px;
            border: 3px solid gold;
            margin-top: 20px;
        }

        .shop-title {
            color: gold;
            font-size: 28px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }

        .shop-items {
            display: grid;
            gap: 10px;
        }

        .shop-item {
            background: #fff;
            border-radius: 15px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: 2px solid gold;
        }

        .shop-item:active {
            transform: scale(0.98);
        }

        .item-icon {
            font-size: 30px;
            width: 50px;
            height: 50px;
            background: gold;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #000;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
        }

        .item-price {
            font-size: 18px;
            font-weight: bold;
            color: gold;
            text-shadow: 1px 1px 0 #000;
        }

        .reset-button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            border: 3px solid white;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>⚡ BLASEN ⚡</h1>
            <div class="rebirth-info" id="rebirthInfo">Rebirth: 0 | Bonus: 1x</div>
        </div>

        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-label">STÄRKE</div>
                <div class="stat-value" id="strength">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">COINS</div>
                <div class="stat-value" id="coins">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">AUTO CLICKER</div>
                <div class="stat-value" id="autoClickers">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">REBIRTH</div>
                <div class="stat-value" id="rebirths">0</div>
            </div>
        </div>

        <div class="character-section">
            <div class="character-area" id="clickArea">
                <div class="character" id="character">
                    <div class="blasen-character">
                        <div class="hair"></div>
                        <div class="head"></div>
                        <div class="eyes"></div>
                        <div class="pupils"></div>
                        <div class="mouth"></div>
                        <div class="body"></div>
                    </div>
                </div>
                <div class="click-text">👆 TIPPEN 👆</div>
                <div class="click-counter" id="clickCounter">0</div>
            </div>

            <div class="auto-clicker-button" id="autoClickerToggle">
                <div class="auto-icon" id="autoIcon">⏹️</div>
                <div class="auto-status" id="autoStatus">AUS</div>
            </div>
        </div>

        <div class="rebirth-section">
            <div class="rebirth-button" id="rebirthButton">
                🌟 REBIRTH 🌟
            </div>
            <div class="rebirth-bonus" id="rebirthProgress">
                Noch 10000 Stärke bis Rebirth
            </div>
        </div>

        <div class="fight-section">
            <div class="fight-title">⚔️ ARENA ⚔️</div>
            <div class="enemy-info">
                <div class="enemy-name" id="enemyName">WILDES TIER</div>
                <div class="enemy-stats" id="enemyStats">Stärke: 100 | Coins: 50</div>
                <div class="health-bar">
                    <div class="health-fill" id="enemyHealth" style="width: 100%"></div>
                </div>
            </div>
            <button class="fight-button" id="fightButton">⚔️ KÄMPFEN ⚔️</button>
            <div class="fight-log" id="fightLog">Willkommen in der Arena!</div>
        </div>

        <div class="shop-container">
            <div class="shop-title">🛒 SHOP 🛒</div>
            <div class="shop-items" id="shopItems"></div>
            <button class="reset-button" id="resetButton">🔄 NEUES SPIEL 🔄</button>
        </div>
    </div>

    <script>
        // Spielvariablen
        let strength = 1;
        let coins = 0;
        let autoClickers = 0;
        let clickCount = 0;
        let rebirths = 0;
        let rebirthBonus = 1;
        
        // Auto Clicker Status
        let autoClickerActive = false;
        let autoClickerInterval = null;
        
        // Kampf Variablen
        let currentEnemy = {
            name: 'Wildes Tier',
            strength: 100,
            health: 100,
            maxHealth: 100,
            coinReward: 50,
            level: 1
        };
        
        let fightLog = ['Willkommen in der Arena!'];
        let inFight = false;
        
        // Shop Items
        let shopItems = [
            {
                id: 'strength',
                name: '💪 STÄRKE +10',
                desc: 'Permanent mehr Kraft',
                icon: '💪',
                basePrice: 10,
                price: 10,
                level: 0,
                maxLevel: 1000,
                type: 'strength'
            },
            {
                id: 'auto1',
                name: '🤖 AUTO CLICKER',
                desc: '1x pro Sekunde',
                icon: '🤖',
                basePrice: 50,
                price: 50,
                level: 0,
                maxLevel: 100,
                type: 'auto',
                power: 1
            },
            {
                id: 'auto2',
                name: '⚡ TURBO CLICKER',
                desc: '2x pro Sekunde',
                icon: '⚡',
                basePrice: 200,
                price: 200,
                level: 0,
                maxLevel: 100,
                type: 'auto',
                power: 2
            },
            {
                id: 'auto3',
                name: '🚀 MEGA CLICKER',
                desc: '5x pro Sekunde',
                icon: '🚀',
                basePrice: 500,
                price: 500,
                level: 0,
                maxLevel: 100,
                type: 'auto',
                power: 5
            }
        ];

        // DOM Elemente
        const clickArea = document.getElementById('clickArea');
        const strengthElement = document.getElementById('strength');
        const coinsElement = document.getElementById('coins');
        const autoClickersElement = document.getElementById('autoClickers');
        const rebirthsElement = document.getElementById('rebirths');
        const rebirthInfo = document.getElementById('rebirthInfo');
        const clickCounterElement = document.getElementById('clickCounter');
        const autoClickerToggle = document.getElementById('autoClickerToggle');
        const autoIcon = document.getElementById('autoIcon');
        const autoStatus = document.getElementById('autoStatus');
        const rebirthButton = document.getElementById('rebirthButton');
        const rebirthProgress = document.getElementById('rebirthProgress');
        const fightButton = document.getElementById('fightButton');
        const enemyName = document.getElementById('enemyName');
        const enemyStats = document.getElementById('enemyStats');
        const enemyHealth = document.getElementById('enemyHealth');
        const fightLogElement = document.getElementById('fightLog');
        const shopContainer = document.getElementById('shopItems');
        const resetButton = document.getElementById('resetButton');

        // Click Event
        clickArea.addEventListener('click', (e) => {
            e.preventDefault();
            handleClick();
        });

        clickArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick();
        });

        function handleClick() {
            // Stärke erhöhen (mit Rebirth Bonus)
            strength += 1 * rebirthBonus;
            
            // Coins erhalten (alle 2 Tipps)
            clickCount++;
            if (clickCount % 2 === 0) {
                coins += 1;
                showAnimation('+1 🪙', '#ffd700');
            }
            
            updateDisplay();
            updateShop();
            checkRebirthAvailable();
        }

        // Auto Clicker Toggle
        autoClickerToggle.addEventListener('click', () => {
            toggleAutoClicker();
        });

        function toggleAutoClicker() {
            autoClickerActive = !autoClickerActive;
            
            if (autoClickerActive) {
                autoIcon.textContent = '▶️';
                autoStatus.textContent = 'AN';
                autoClickerToggle.classList.add('active');
                
                // Auto Clicker starten
                if (autoClickerInterval) clearInterval(autoClickerInterval);
                autoClickerInterval = setInterval(() => {
                    if (autoClickers > 0) {
                        for (let i = 0; i < autoClickers; i++) {
                            handleClick();
                        }
                    }
                }, 1000);
            } else {
                autoIcon.textContent = '⏹️';
                autoStatus.textContent = 'AUS';
                autoClickerToggle.classList.remove('active');
                
                if (autoClickerInterval) {
                    clearInterval(autoClickerInterval);
                    autoClickerInterval = null;
                }
            }
        }

        // Rebirth System
        function checkRebirthAvailable() {
            if (strength >= 10000) {
                rebirthButton.classList.remove('disabled');
                rebirthProgress.textContent = '✨ REBIRTH BEREIT! ✨';
            } else {
                rebirthButton.classList.add('disabled');
                rebirthProgress.textContent = `Noch ${10000 - strength} Stärke bis Rebirth`;
            }
        }

        rebirthButton.addEventListener('click', () => {
            if (strength >= 10000) {
                doRebirth();
            }
        });

        function doRebirth() {
            // Rebirth Bonus erhöhen
            rebirths++;
            rebirthBonus = rebirths + 1;
            
            // Stärke zurücksetzen (aber Basis behalten)
            strength = 1;
            
            // Coins teilweise behalten
            coins = Math.floor(coins / 2);
            
            // Auto Clicker bleiben
            // Shop Items bleiben
            
            showAnimation(`✨ REBIRTH ${rebirths}! ✨`, '#9b59b6');
            
            updateDisplay();
            checkRebirthAvailable();
            rebirthInfo.textContent = `Rebirth: ${rebirths} | Bonus: ${rebirthBonus}x`;
        }

        // Kampf System
        function spawnEnemy() {
            let baseStrength = 100 + (rebirths * 200);
            let baseHealth = 100 + (rebirths * 200);
            let baseReward = 50 + (rebirths * 100);
            
            let enemies = [
                { name: '🐺 Wilder Wolf', strength: baseStrength, health: baseHealth, reward: baseReward },
                { name: '🐻 Braunbär', strength: baseStrength * 1.5, health: baseHealth * 1.5, reward: baseReward * 1.5 },
                { name: '🦁 Löwe', strength: baseStrength * 2, health: baseHealth * 2, reward: baseReward * 2 },
                { name: '🐉 Drache', strength: baseStrength * 3, health: baseHealth * 3, reward: baseReward * 3 },
                { name: '👹 Boss', strength: baseStrength * 5, health: baseHealth * 5, reward: baseReward * 5 }
            ];
            
            let enemy = enemies[Math.floor(Math.random() * enemies.length)];
            currentEnemy = {
                name: enemy.name,
                strength: Math.floor(enemy.strength),
                health: Math.floor(enemy.health),
                maxHealth: Math.floor(enemy.health),
                coinReward: Math.floor(enemy.reward)
            };
            
            updateEnemyDisplay();
        }

        function updateEnemyDisplay() {
            enemyName.textContent = currentEnemy.name;
            enemyStats.textContent = `Stärke: ${currentEnemy.strength} | Coins: ${currentEnemy.coinReward}`;
            let healthPercent = (currentEnemy.health / currentEnemy.maxHealth) * 100;
            enemyHealth.style.width = `${healthPercent}%`;
        }

        fightButton.addEventListener('click', () => {
            if (!inFight) {
                startFight();
            }
        });

        function startFight() {
            inFight = true;
            fightButton.textContent = '⚔️ KÄMPFT ⚔️';
            fightButton.style.background = 'linear-gradient(135deg, #e74c3c 0%, #c0392b 100%)';
            
            // Kampf Loop
            let fightInterval = setInterval(() => {
                if (currentEnemy.health <= 0) {
                    // Sieg
                    clearInterval(fightInterval);
                    winFight();
                    return;
                }
                
                if (strength <= 0) {
                    // Niederlage (sollte nicht passieren)
                    clearInterval(fightInterval);
                    loseFight();
                    return;
                }
                
                // Kämpfen
                let playerDamage = Math.floor(strength / 10) + 1;
                let enemyDamage = Math.floor(currentEnemy.strength / 20) + 1;
                
                currentEnemy.health -= playerDamage;
                strength -= enemyDamage;
                
                if (strength < 1) strength = 1;
                
                fightLog.unshift(`💥 Du machst ${playerDamage} Schaden! 👊 Gegner macht ${enemyDamage} Schaden!`);
                if (fightLog.length > 5) fightLog.pop();
                
                updateEnemyDisplay();
                updateDisplay();
                
            }, 1000);
            
            // Timeout speichern für spätere Nutzung
            window.currentFightInterval = fightInterval;
        }

        function winFight() {
            clearInterval(window.currentFightInterval);
            
            // Belohnung
            let reward = currentEnemy.coinReward * rebirthBonus;
            coins += reward;
            
            fightLog.unshift(`🎉 SIEG! +${reward} Coins! 🎉`);
            
            // Neuen Gegner spawnen
            spawnEnemy();
            
            inFight = false;
            fightButton.textContent = '⚔️ NÄCHSTER KAMPF ⚔️';
            fightButton.style.background = 'linear-gradient(135deg, #f1c40f 0%, #e67e22 100%)';
            
            updateDisplay();
        }

        function loseFight() {
            clearInterval(window.currentFightInterval);
            
            fightLog.unshift(`😵 NIEDERLAGE! Du verlierst Coins...`);
            
            // Strafe
            coins = Math.floor(coins / 2);
            
            // Neuen Gegner spawnen
            spawnEnemy();
            
            inFight = false;
            fightButton.textContent = '⚔️ NEUER KAMPF ⚔️';
            fightButton.style.background = 'linear-gradient(135deg, #f1c40f 0%, #e67e22 100%)';
            
            updateDisplay();
        }

        // Shop Funktionen
        function updateShop() {
            shopContainer.innerHTML = '';
            
            shopItems.forEach((item, index) => {
                const itemElement = document.createElement('div');
                itemElement.className = `shop-item ${item.level >= item.maxLevel ? 'disabled' : ''}`;
                
                itemElement.innerHTML = `
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name} (${item.level})</div>
                    </div>
                    <div class="item-price">
                        <span>${item.price}</span>
                        <span>🪙</span>
                    </div>
                `;
                
                itemElement.addEventListener('click', () => buyItem(index));
                shopContainer.appendChild(itemElement);
            });
        }

        function buyItem(index) {
            const item = shopItems[index];
            
            if (coins >= item.price && item.level < item.maxLevel) {
                coins -= item.price;
                item.level++;
                
                if (item.type === 'strength') {
                    strength += 10;
                } else if (item.type === 'auto') {
                    autoClickers += item.power;
                }
                
                item.price = Math.floor(item.basePrice * Math.pow(1.3, item.level));
                
                updateDisplay();
                updateShop();
                showAnimation('Gekauft! 🎉', '#27ae60');
            }
        }

        // Animation
        function showAnimation(text, color) {
            const anim = document.createElement('div');
            anim.textContent = text;
            anim.style.position = 'fixed';
            anim.style.left = '50%';
            anim.style.top = '50%';
            anim.style.transform = 'translate(-50%, -50%)';
            anim.style.fontSize = '30px';
            anim.style.fontWeight = 'bold';
            anim.style.color = color;
            anim.style.textShadow = '2px 2px 0 #000';
            anim.style.zIndex = '1000';
            anim.style.animation = 'floatUp 1s ease-out forwards';
            document.body.appendChild(anim);
            
            setTimeout(() => anim.remove(), 1000);
        }

        // Display aktualisieren
        function updateDisplay() {
            strengthElement.textContent = Math.floor(strength);
            coinsElement.textContent = Math.floor(coins);
            autoClickersElement.textContent = autoClickers;
            rebirthsElement.textContent = rebirths;
            clickCounterElement.textContent = clickCount;
            fightLogElement.innerHTML = fightLog.join('<br>');
        }

        // Spiel zurücksetzen
        function resetGame() {
            if (confirm('Wirklich neu starten?')) {
                strength = 1;
                coins = 0;
                autoClickers = 0;
                clickCount = 0;
                rebirths = 0;
                rebirthBonus = 1;
                
                if (autoClickerActive) {
                    toggleAutoClicker();
                }
                
                shopItems.forEach(item => {
                    item.level = 0;
                    item.price = item.basePrice;
                });
                
                spawnEnemy();
                updateDisplay();
                updateShop();
                checkRebirthAvailable();
                rebirthInfo.textContent = `Rebirth: 0 | Bonus: 1x`;
            }
        }

        // Styles für Animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes floatUp {
                0% { opacity: 1; transform: translate(-50%, -50%); }
                100% { opacity: 0; transform: translate(-50%, -150%); }
            }
        `;
        document.head.appendChild(style);

        // Initialisierung
        spawnEnemy();
        updateDisplay();
        updateShop();
        checkRebirthAvailable();
        rebirthButton.classList.add('disabled');

        resetButton.addEventListener('click', resetGame);
    </script>
</body>
</html>
